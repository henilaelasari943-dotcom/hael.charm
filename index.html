<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Charm Shop</title>

<style>

body{
font-family:Arial;
margin:0;
background:#fff5f8;
}

header{
background:#ff6fa5;
color:white;
padding:20px;
text-align:center;
font-size:24px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.product{
background:white;
width:170px;
border-radius:12px;
padding:12px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:10px;
}

.price{
color:#ff2e7e;
font-weight:bold;
}

button{
background:#ff2e7e;
color:white;
border:none;
padding:8px 10px;
border-radius:6px;
cursor:pointer;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:#ff2e7e;
color:white;
padding:14px;
border-radius:40px;
}

</style>
</head>

<body>

<header>
✨ hael Charm Shop ✨
</header>

<div class="container">

<div class="product">
<img src="https://via.placeholder.com/200">
<h4>Heart Charm</h4>
<p class="price">Rp5.000</p>
<button onclick="addCart('Heart Charm')">Tambah</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h4>Star Charm</h4>
<p class="price">Rp5.000</p>
<button onclick="addCart('Star Charm')">Tambah</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h4>Butterfly Charm</h4>
<p class="price">Rp6.000</p>
<button onclick="addCart('Butterfly Charm')">Tambah</button>
</div>

</div>

<div class="cart" onclick="checkout()">
🛒 Order
</div>

<script>

let cart=[]

function addCart(item){
cart.push(item)
alert(item+" ditambahkan")
}

function checkout(){

let text="Halo saya ingin order:%0A"

cart.forEach((item,i)=>{
text+=(i+1)+". "+item+"%0A"
})

window.open("https://wa.me/6281282927475?text="+text)

}

</script>

</body>
</html>
